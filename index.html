<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C++alculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      main {
        flex: 1;
      }

      .calculator {
        max-width: 320px;
        margin: 50px auto;
        padding: 20px;
        background: #1e1e1e;
        border-radius: 10px;
      }
      .btn {
        width: 100%;
        height: 60px;
        font-size: 1.2rem;
      }
      .display {
        height: 60px;
        font-size: 1.5rem;
        text-align: right;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand align-items-center" href="#"
          ><img src="src/logo.svg" height="30" alt="C++alculator Logo"
        /></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Головна</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="about.html">Про сайт</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Профіль</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Реєстрація</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container py-5">
      <div class="container">
        <div class="text-center mt-4 mb-4">
          <h2 style="cursor: pointer; display: inline-block">
            <span
              id="tab-stnd"
              onclick="showCalc('stnd')"
              style="color: #0091d5; transition: 0.3s"
              >Звичайний</span
            >
            <span style="color: #555; margin: 0 10px">|</span>
            <span
              id="tab-prog"
              onclick="showCalc('prog')"
              style="color: #555; transition: 0.3s"
              >Програмістський</span
            >
          </h2>
        </div>

        <div id="stnd-calc" class="stnd_calculator">
          <div class="calculator">
            <input
              type="text"
              id="display"
              class="form-control display"
              disabled
            />

            <div class="row g-2">
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('%')">%</button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('1/x')">
                  1/x
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-danger" onclick="clearDisplay()">
                  C
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-danger" onclick="backspace()">⌫</button>
              </div>

              <div class="col-3">
                <button class="btn btn-warning" onclick="append('x²')">
                  x²
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('x³')">
                  x³
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('√x')">
                  √x
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('/')">/</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('7')">
                  7
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('8')">
                  8
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('9')">
                  9
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('*')">*</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('4')">
                  4
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('5')">
                  5
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('6')">
                  6
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('-')">-</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('1')">
                  1
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('2')">
                  2
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('3')">
                  3
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('+')">+</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="negative()">
                  +/-
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('0')">
                  0
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('.')">
                  .
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-success" onclick="calculate()">=</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="container">
        <div id="prog-calc" class="prog_calculator" style="display: none">
          <div class="calculator">
            <input
              type="text"
              id="display"
              class="form-control display mb-2"
              disabled
            />

            <div class="row g-2">
              <div class="col-3">
                <button class="btn btn-warning" onclick="setBase(2)">
                  BIN
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="setBase(8)">
                  OCT
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="setBase(10)">
                  DEC
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="setBase(16)">
                  HEX
                </button>
              </div>

              <div class="col-2">
                <button class="btn btn-secondary" onclick="append('A')">
                  A
                </button>
              </div>
              <div class="col-2">
                <button class="btn btn-secondary" onclick="append('B')">
                  B
                </button>
              </div>
              <div class="col-2">
                <button class="btn btn-secondary" onclick="append('C')">
                  C
                </button>
              </div>
              <div class="col-2">
                <button class="btn btn-secondary" onclick="append('D')">
                  D
                </button>
              </div>
              <div class="col-2">
                <button class="btn btn-secondary" onclick="append('E')">
                  E
                </button>
              </div>
              <div class="col-2">
                <button class="btn btn-secondary" onclick="append('F')">
                  F
                </button>
              </div>

              <div class="col-3">
                <button class="btn btn-warning" onclick="bitOp('<<')">
                  <<
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="bitOp('>>')">
                  >>
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-danger" onclick="clearDisplay()">
                  C
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-danger" onclick="backspace()">⌫</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('(')">
                  (
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append(')')">
                  )
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('%')">%</button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('/')">/</button>
              </div>

              <div class="col-3">
                <button class="btn btn-warning" onclick="bitOp('~')">
                  NOT
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="bitOp('&')">
                  AND
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="bitOp('|')">OR</button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="bitOp('^')">
                  XOR
                </button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('7')">
                  7
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('8')">
                  8
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('9')">
                  9
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('*')">*</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('4')">
                  4
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('5')">
                  5
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('6')">
                  6
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('-')">-</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('1')">
                  1
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('2')">
                  2
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('3')">
                  3
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-warning" onclick="append('+')">+</button>
              </div>

              <div class="col-3">
                <button class="btn btn-secondary" onclick="negative()">
                  +/-
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('0')">
                  0
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-secondary" onclick="append('.')">
                  .
                </button>
              </div>
              <div class="col-3">
                <button class="btn btn-success" onclick="calculate()">=</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p>© 2026 C++alculator | Web Design Lab</p>
        <small class="text-secondary"
          >Розроблено для лабораторної роботи №1</small
        >
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
