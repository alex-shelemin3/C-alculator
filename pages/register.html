<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C++alculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      main {
        flex: 1;
      }
      .card-custom {
        background-color: #1e1e1e;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      }
      ::placeholder {
        color: #aaa !important;
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand align-items-center" href="#">
          <img src="../src/logo.svg" height="30" alt="C++alculator Logo" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Головна</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="about.html">Про сайт</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Профіль</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="login.html">Вхід</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      <div
        class="container d-flex justify-content-center align-items-center"
        style="min-height: 80vh"
      >
        <div
          class="card-custom p-4 text-center"
          style="width: 100%; max-width: 350px"
        >
          <div class="mb-3">
            <img src="../src/icon2.svg" width="100" alt="icon" />
          </div>
          <h4 class="mb-3">Створити акаунт</h4>

          <!-- ✅ Всі поля мають унікальні id -->
          <input
            id="reg-name"
            type="text"
            class="form-control mb-3 bg-dark text-white border-secondary"
            placeholder="Ваше ім'я"
          />
          <input
            id="reg-email"
            type="email"
            class="form-control mb-3 bg-dark text-white border-secondary"
            placeholder="Email адреса"
          />

          <div class="row mb-3">
            <div class="col-md-6 text-start">
              <label class="form-label text-secondary">Стать</label>
              <!-- ✅ id="reg-gender" -->
              <select
                id="reg-gender"
                class="form-select bg-dark text-white border-secondary"
              >
                <option value="" selected disabled>Оберіть стать</option>
                <option value="Чоловіча">Чоловіча</option>
                <option value="Жіноча">Жіноча</option>
              </select>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-secondary">Дата народження</label>
              <!-- ✅ id="reg-birth" -->
              <input
                id="reg-birth"
                type="date"
                class="form-control bg-dark text-white border-secondary"
              />
            </div>
          </div>

          <input
            id="reg-password"
            type="password"
            class="form-control mb-3 bg-dark text-white border-secondary"
            placeholder="Пароль"
          />
          <input
            id="reg-confirm"
            type="password"
            class="form-control mb-3 bg-dark text-white border-secondary"
            placeholder="Повторіть пароль"
          />

          <div class="form-check text-start mb-3">
            <!-- ✅ id="reg-agree" -->
            <input class="form-check-input" type="checkbox" id="reg-agree" />
            <label class="form-check-label text-secondary" for="reg-agree">
              Я погоджуюсь з умовами
            </label>
          </div>

          <button class="btn btn-primary w-100 mb-3" onclick="registerUser()">
            Зареєструватись
          </button>
          <hr class="border-secondary" />
          <p class="text-secondary mb-0" style="font-size: 0.9rem">
            Вже маєте акаунт?
            <a href="login.html" class="text-info">Увійти</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p>© 2026 C++alculator | Web Design Lab</p>
        <small class="text-secondary"
          >Розроблено для лабораторної роботи №1</small
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/model/auth.model.js"></script>
    <script src="../js/view/auth.view.js"></script>
    <script src="../js/controller/auth.controller.js"></script>
    <script src="../js/view/navbar.view.js"></script>
  </body>
</html>
