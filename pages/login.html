<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C++alculator — Вхід</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      main {
        flex: 1;
      }
      .card-custom {
        background-color: #1e1e1e;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      }
      ::placeholder {
        color: #aaa !important;
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand align-items-center" href="../index.html">
          <img src="../src/logo.svg" height="30" alt="C++alculator Logo" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Головна</a>
            </li>
          </ul>
          <!-- navbar.js динамічно замінить цей блок -->
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="about.html">Про сайт</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Профіль</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="register.html">Реєстрація</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      <div
        class="container d-flex justify-content-center align-items-center"
        style="min-height: 80vh"
      >
        <div
          class="card-custom p-4 text-center"
          style="width: 100%; max-width: 350px"
        >
          <div class="mb-3">
            <img src="../src/icon2.svg" width="100" alt="icon" />
          </div>
          <h4 class="mb-3">Вхід у систему</h4>

          <input
            id="email"
            type="email"
            class="form-control mb-3 bg-dark text-white border-secondary"
            placeholder="Email адреса"
          />
          <input
            id="password"
            type="password"
            class="form-control mb-3 bg-dark text-white border-secondary"
            placeholder="Пароль"
          />

          <div class="form-check text-start mb-3">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label text-secondary" for="remember">
              Запам'ятати мене
            </label>
          </div>

          <button class="btn btn-primary w-100 mb-3" onclick="loginUser()">
            Увійти
          </button>
          <hr class="border-secondary" />
          <p class="text-secondary mb-0" style="font-size: 0.9rem">
            Ще не маєте акаунту?
            <a href="register.html" class="text-info">Зареєструватися</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p>© 2026 C++alculator | Web Design Lab</p>
        <small class="text-secondary"
          >Розроблено для лабораторної роботи №1</small
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- MVC: Model → View → Controller, потім navbar -->
    <script src="../js/model/auth.model.js"></script>
    <script src="../js/view/auth.view.js"></script>
    <script src="../js/controller/auth.controller.js"></script>
    <script src="../js/view/navbar.view.js"></script>
  </body>
</html>
